idea:
  title: An LLM That's Careful With Its Words
  domain: nlp
  hypothesis: 'Requiring a language model to generate explicit chain-of-thought or
    "thinking tokens" between every sentence will cause it to consider each sentence
    more carefully before stating it, resulting in qualitatively different text.

    '
  background:
    description: 'Can we use chain-of-thought to make an LLM that considers every
      sentence carefully before stating it? For instance, simply require some thinking
      tokens between every sentence. How would text from such a model be qualitatively
      different?

      '
  metadata:
